<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng Ký Tài Khoản</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3B82F6;--primary-dark:#2563EB;--primary-light:#DBEAFE;
  --success:#10B981;--danger:#EF4444;--warning:#F59E0B;
  --bg:#F8FAFC;--white:#FFF;
  --gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;
  --font:'Be Vietnam Pro',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.1);--shadow-lg:0 10px 15px rgba(0,0,0,.1);
  --radius:12px;
}
body{background:var(--bg);font-family:var(--font);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);
  padding:2.5rem;width:100%;max-width:460px}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--gray-500);
  text-decoration:none;font-size:.85rem;font-weight:500;margin-bottom:1.5rem;transition:color .2s}
.back:hover{color:var(--primary)}
h1{font-size:1.5rem;font-weight:800;color:var(--gray-900);margin-bottom:.25rem}
.subtitle{color:var(--gray-400);font-size:.85rem;margin-bottom:2rem}
.form-group{margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
label{font-size:.8rem;font-weight:600;color:var(--gray-600);margin-bottom:.3rem;display:block}
input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:var(--font);font-size:.9rem;color:var(--gray-800);outline:none;transition:all .2s;background:var(--gray-100)}
input:focus{border-color:var(--primary);background:var(--white);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
input::placeholder{color:var(--gray-400)}
.err{font-size:.75rem;color:var(--danger);margin-top:.2rem;display:none}
.err.show{display:block}
.msg{padding:.7rem 1rem;border-radius:var(--radius);font-size:.85rem;margin-bottom:1rem;display:none}
.msg.ok{display:block;background:#D1FAE5;color:#065F46}
.msg.err{display:block;background:#FEE2E2;color:#991B1B}
.btn{font-family:var(--font);font-size:.95rem;font-weight:600;
  padding:.75rem;border-radius:var(--radius);border:none;cursor:pointer;
  width:100%;transition:all .2s}
.btn-primary{background:var(--primary);color:white;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-primary:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer-link{text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--gray-500)}
.footer-link a{color:var(--primary);text-decoration:none;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.4);border-top-color:white;
  border-radius:50%;animation:spin .5s linear infinite;margin-right:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">← Quay lại</a>
  <h1>🎓 Đăng Ký Tài Khoản</h1>
  <p class="subtitle">Tạo tài khoản sinh viên mới</p>

  <div class="form-row">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="vd: nguyenvana" autocomplete="off">
      <div class="err" id="err-username"></div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="email@example.com">
      <div class="err" id="err-email"></div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Họ và tên</label>
      <input type="text" id="full_name" placeholder="Nguyễn Văn A">
    </div>
    <div class="form-group">
      <label>MSSV</label>
      <input type="text" id="student_id" placeholder="2021001234">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
      <div class="err" id="err-password"></div>
    </div>
    <div class="form-group">
      <label>Xác nhận mật khẩu</label>
      <input type="password" id="password2" placeholder="Nhập lại">
      <div class="err" id="err-password2"></div>
    </div>
  </div>

  <div class="msg" id="msg"></div>
  <button class="btn btn-primary" id="btn-register">Đăng Ký</button>
  <div class="footer-link">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
</div>

<script>
document.getElementById('btn-register').addEventListener('click', async ()=>{
  const username = document.getElementById('username').value.trim()
  const email = document.getElementById('email').value.trim()
  const full_name = document.getElementById('full_name').value.trim()
  const student_id = document.getElementById('student_id').value.trim()
  const pwd = document.getElementById('password').value
  const pwd2 = document.getElementById('password2').value
  let ok = true

  const clearErr = id=>{ const e=document.getElementById(id);e.textContent='';e.classList.remove('show') }
  const showErr = (id,msg)=>{ const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');ok=false }

  clearErr('err-username');clearErr('err-email');clearErr('err-password');clearErr('err-password2')
  document.getElementById('msg').style.display='none'

  if(!username||username.length<3) showErr('err-username','Username tối thiểu 3 ký tự')
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) showErr('err-email','Email không hợp lệ')
  if(!pwd||pwd.length<6) showErr('err-password','Mật khẩu tối thiểu 6 ký tự')
  if(pwd!==pwd2) showErr('err-password2','Mật khẩu không khớp')
  if(!ok) return

  const btn = document.getElementById('btn-register')
  btn.disabled=true
  btn.innerHTML='<span class="spinner"></span>Đang xử lý...'

  try{
    const res = await fetch('/api/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,email,password:pwd,full_name,student_id})
    })
    const data = await res.json()
    if(!res.ok){
      setMsg(data.detail||'Lỗi đăng ký','err')
      return
    }
    setMsg('✅ '+data.message+' Đang chuyển đến trang đăng nhập...','ok')
    setTimeout(()=>location.href='/login',1500)
  } catch(e){
    setMsg('Lỗi kết nối server','err')
  } finally{
    btn.disabled=false
    btn.textContent='Đăng Ký'
  }
})

function setMsg(t,type){
  const m=document.getElementById('msg')
  m.textContent=t;m.className='msg '+type
}
</script>
</body>
</html>
