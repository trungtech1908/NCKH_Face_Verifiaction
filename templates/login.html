<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đăng Nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3B82F6;--primary-dark:#2563EB;--primary-light:#DBEAFE;
  --success:#10B981;--danger:#EF4444;
  --bg:#F8FAFC;--white:#FFF;
  --gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-400:#9CA3AF;
  --gray-500:#6B7280;--gray-600:#4B5563;--gray-800:#1F2937;--gray-900:#111827;
  --font:'Be Vietnam Pro',sans-serif;
  --shadow-lg:0 10px 15px rgba(0,0,0,.1);--radius:12px;
}
body{background:var(--bg);font-family:var(--font);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:var(--white);border-radius:20px;box-shadow:var(--shadow-lg);
  padding:2.5rem;width:100%;max-width:420px}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--gray-500);
  text-decoration:none;font-size:.85rem;font-weight:500;margin-bottom:1.5rem;transition:color .2s}
.back:hover{color:var(--primary)}
h1{font-size:1.5rem;font-weight:800;color:var(--gray-900);margin-bottom:.25rem}
.subtitle{color:var(--gray-400);font-size:.85rem;margin-bottom:2rem}
.form-group{margin-bottom:1rem}
label{font-size:.8rem;font-weight:600;color:var(--gray-600);margin-bottom:.3rem;display:block}
input{width:100%;padding:.75rem 1rem;border:1.5px solid var(--gray-200);border-radius:var(--radius);
  font-family:var(--font);font-size:.9rem;color:var(--gray-800);outline:none;transition:all .2s;background:var(--gray-100)}
input:focus{border-color:var(--primary);background:var(--white);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
input::placeholder{color:var(--gray-400)}
.msg{padding:.7rem 1rem;border-radius:var(--radius);font-size:.85rem;margin-bottom:1rem;display:none}
.msg.ok{display:block;background:#D1FAE5;color:#065F46}
.msg.err{display:block;background:#FEE2E2;color:#991B1B}
.msg.warn{display:block;background:#FEF3C7;color:#92400E}
.btn{font-family:var(--font);font-size:.95rem;font-weight:600;
  padding:.75rem;border-radius:var(--radius);border:none;cursor:pointer;
  width:100%;transition:all .2s}
.btn-primary{background:var(--primary);color:white;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.btn-primary:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.footer-link{text-align:center;margin-top:1.25rem;font-size:.85rem;color:var(--gray-500)}
.footer-link a{color:var(--primary);text-decoration:none;font-weight:600}
.spinner{display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.4);border-top-color:white;
  border-radius:50%;animation:spin .5s linear infinite;margin-right:.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="back">← Quay lại</a>
  <h1>👋 Đăng Nhập</h1>
  <p class="subtitle">Sử dụng tài khoản của bạn để truy cập hệ thống</p>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Nhập username" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Mật khẩu</label>
    <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
  </div>
  <div class="msg" id="msg"></div>
  <button class="btn btn-primary" id="btn-login">Đăng Nhập</button>
  <div class="footer-link">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></div>
</div>

<script>
async function login(){
  const username=document.getElementById('username').value.trim()
  const password=document.getElementById('password').value
  if(!username||!password){ setMsg('Vui lòng nhập đủ thông tin','warn');return }

  const btn=document.getElementById('btn-login')
  btn.disabled=true
  btn.innerHTML='<span class="spinner"></span>Đang xác thực...'

  try{
    const res=await fetch('/api/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    })
    const data=await res.json()
    if(!res.ok){setMsg(data.detail||'Đăng nhập thất bại','err');return}

    localStorage.setItem('token',data.token)
    localStorage.setItem('user',JSON.stringify(data.user))
    setMsg('✅ '+data.message,'ok')

    // Redirect theo role
    const role=data.user.role
    setTimeout(()=>{
      if(role==='admin') location.href='/admin'
      else location.href='/user'
    },700)
  } catch(e){
    setMsg('Lỗi kết nối server','err')
  } finally{
    btn.disabled=false
    btn.textContent='Đăng Nhập'
  }
}

function setMsg(t,type){
  const m=document.getElementById('msg')
  m.textContent=t;m.className='msg '+type
}

document.getElementById('btn-login').addEventListener('click',login)
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')login()})
</script>
</body>
</html>
